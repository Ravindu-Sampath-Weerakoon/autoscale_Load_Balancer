services:
  web:
    build: .
    # Docker Compose automatically assigns unique container names (e.g. cluster_loadbalancer-web-1, etc.)
    expose:
      - "8000"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: resiliaproxy_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: always
